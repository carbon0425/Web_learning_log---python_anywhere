{% extends 'learning_logs_app/base.html' %}
{% load bootstrap4 %}

{% block page_header %}
    <h1>Edit Entry</h1>
{% endblock page_header %}

{% block content %}
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary">Save changes</button>
    </form>
{% endblock content %}
