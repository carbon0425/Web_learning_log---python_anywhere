{% extends 'learning_logs_app/base.html' %}
{% load bootstrap4 %}

{% block page_header %}
    <h1>New Topic</h1>
{% endblock page_header %}

{% block content %}
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}

        {% buttons %}
            <button type="submit" class="btn btn-primary">Add Topic</button>
        {% endbuttons %}
        <input type="hidden" name="next"
        value="{% url 'learning_logs_app:topics' %}" />

    </form>
{% endblock content %}
