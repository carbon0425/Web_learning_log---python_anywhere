{% extends "learning_logs_app/base.html" %}
{% load bootstrap4 %}

{% block page_header %}
    <h1>Register Here.</h1>
{% endblock page_header %}

{% block content %}
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        
        {% buttons %}
            <button type="submit" class="btn btn-primary">Register</button>
        {% endbuttons %}
        
        <input type="hidden" name="next"
        value="{% url 'learning_logs_app:index' %}"/>
        
    </form>
{% endblock content %}
